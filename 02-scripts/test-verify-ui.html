<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试验证工具 — 需求规格全覆盖</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --primary: #1677FF; --primary-hover: #0958D9; --primary-light: rgba(22,119,255,0.08);
            --bg-page: #F5F7FA; --bg-card: #FFF; --text-primary: #1D2129; --text-secondary: #86909C;
            --border: #E5E6EB; --radius: 12px; --shadow: 0 4px 16px rgba(0,0,0,0.06);
            --pass: #52C41A; --pass-bg: #F6FFED; --pass-border: #B7EB8F;
            --fail: #FF4D4F; --fail-bg: #FFF2F0; --fail-border: #FFCCC7;
            --skip: #FAAD14; --skip-bg: #FFFBE6; --skip-border: #FFE58F;
            --info-bg: #E6F4FF; --info-border: #91CAFF; --info-text: #003EB3;
        }
        * { box-sizing:border-box; margin:0; padding:0; }
        body {
            font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"PingFang SC","Microsoft YaHei",sans-serif;
            background:var(--bg-page); color:var(--text-primary); line-height:1.5; padding:24px 16px;
        }
        .container { max-width:960px; margin:0 auto; }
        .card { background:var(--bg-card); border-radius:var(--radius); box-shadow:var(--shadow); padding:28px; margin-bottom:20px; }

        .header { text-align:center; margin-bottom:28px; }
        .header h1 { font-size:24px; font-weight:600; margin-bottom:6px; }
        .header h1 span { background:linear-gradient(90deg,#1677FF,#36BFFA); -webkit-background-clip:text; background-clip:text; color:transparent; }
        .header .subtitle { font-size:14px; color:var(--text-secondary); }
        .header .coverage { font-size:12px; color:var(--text-secondary); margin-top:4px; }

        .file-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; margin-bottom:20px; }
        .file-zone {
            border:2px dashed var(--border); border-radius:var(--radius); padding:20px 12px;
            text-align:center; cursor:pointer; transition:all 0.25s ease; background:#FAFBFC;
        }
        .file-zone:hover { border-color:var(--primary); background:var(--primary-light); }
        .file-zone .icon { font-size:28px; margin-bottom:6px; }
        .file-zone .label { font-size:13px; font-weight:500; color:var(--text-primary); margin-bottom:2px; }
        .file-zone .hint { font-size:11px; color:var(--text-secondary); }
        .file-zone.loaded { border-color:var(--pass); border-style:solid; background:var(--pass-bg); }
        .file-zone .fname { display:none; margin-top:6px; font-size:12px; font-weight:500; color:var(--pass); }
        .file-zone.loaded .fname { display:block; }
        .file-zone input[type="file"] { display:none; }

        .btn-row { display:flex; gap:12px; margin-bottom:20px; }
        .btn {
            padding:11px 24px; border:none; border-radius:8px; font-size:15px;
            font-weight:500; cursor:pointer; transition:all 0.2s ease;
            display:flex; align-items:center; gap:6px; justify-content:center;
        }
        .btn:disabled { opacity:0.5; cursor:not-allowed; transform:none !important; }
        .btn-primary { background:var(--primary); color:#FFF; flex:1; }
        .btn-primary:hover:not(:disabled) { background:var(--primary-hover); transform:translateY(-1px); }
        .btn-outline { background:#FFF; color:var(--text-primary); border:1px solid var(--border); }
        .btn-outline:hover:not(:disabled) { border-color:var(--primary); color:var(--primary); }
        .btn-small { padding:6px 14px; font-size:13px; }

        .summary { display:none; }
        .summary-bar { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:20px; }
        .summary-item { padding:16px; border-radius:8px; text-align:center; background:#F9FAFB; border:1px solid var(--border); }
        .summary-item .num { font-size:28px; font-weight:700; }
        .summary-item .desc { font-size:13px; color:var(--text-secondary); margin-top:2px; }
        .summary-item.pass .num { color:var(--pass); }
        .summary-item.fail .num { color:var(--fail); }
        .summary-item.skip .num { color:var(--skip); }
        .summary-item.total .num { color:var(--primary); }
        .summary-verdict { text-align:center; padding:14px; border-radius:8px; font-size:18px; font-weight:700; margin-bottom:20px; }
        .summary-verdict.pass { background:var(--pass-bg); border:1px solid var(--pass-border); color:var(--pass); }
        .summary-verdict.fail { background:var(--fail-bg); border:1px solid var(--fail-border); color:var(--fail); }

        .test-group { margin-bottom:12px; border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
        .test-group .group-header {
            display:flex; align-items:center; justify-content:space-between;
            padding:12px 16px; background:#FAFBFC; cursor:pointer;
            border-bottom:1px solid transparent; transition:background 0.15s; user-select:none;
        }
        .test-group .group-header:hover { background:#F0F2F5; }
        .test-group .group-header .left { display:flex; align-items:center; gap:10px; }
        .test-group .group-header .name { font-weight:600; font-size:14px; }
        .test-group .group-header .sub { font-size:11px; color:var(--text-secondary); font-weight:400; margin-left:6px; }
        .test-group .group-header .badge-group { display:flex; gap:6px; font-size:12px; font-weight:500; }
        .badge { padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; }
        .badge-pass { background:var(--pass-bg); color:var(--pass); border:1px solid var(--pass-border); }
        .badge-fail { background:var(--fail-bg); color:var(--fail); border:1px solid var(--fail-border); }
        .badge-skip { background:var(--skip-bg); color:#AD6800; border:1px solid var(--skip-border); }
        .badge-total { background:#F0F2F5; color:var(--text-secondary); border:1px solid var(--border); }

        .test-group .group-body { display:none; }
        .test-group.expanded .group-body { display:block; }
        .test-group.expanded .group-header { border-bottom-color:var(--border); }

        .test-case { display:flex; align-items:flex-start; gap:10px; padding:8px 16px 8px 20px; border-bottom:1px dashed #E0E0E0; font-size:13px; }
        .test-case:last-child { border-bottom:none; }
        .test-case .icon { font-size:13px; flex-shrink:0; margin-top:2px; }
        .test-case .msg { flex:1; }
        .test-case .detail { font-size:12px; color:var(--text-secondary); margin-top:1px; }
        .test-case.pass { background:#FAFFFA; border-left:3px solid var(--pass); }
        .test-case.fail { background:#FFFAFA; border-left:3px solid var(--fail); }
        .test-case.skip { border-left:3px solid var(--skip); }
        .test-case .req-ref { font-size:10px; color:#999; margin-left:6px; }

        .log-panel {
            display:none; background:#1D2129; border-radius:8px;
            padding:16px; font-family:"SF Mono","Fira Code","Consolas",monospace;
            font-size:12px; line-height:1.6; max-height:300px;
            overflow-y:auto; white-space:pre-wrap; word-break:break-all; margin-bottom:20px;
        }
        .log-panel .log-info { color:#B0BEC5; }
        .log-panel .log-success { color:#69DB7C; }
        .log-panel .log-error { color:#FF6B6B; }
        .log-panel .log-highlight { color:#74C0FC; }

        .msg-box { display:none; padding:12px 16px; border-radius:8px; font-size:14px; margin-bottom:16px; font-weight:500; }
        .msg-box.error { display:block; background:var(--fail-bg); border:1px solid var(--fail-border); color:var(--fail); }

        .coverage-bar { margin-bottom:20px; }
        .coverage-bar .bar-track { height:8px; background:#F0F0F0; border-radius:4px; overflow:hidden; display:flex; }
        .coverage-bar .bar-seg { height:100%; transition:width 0.5s; }
        .coverage-bar .legend { display:flex; gap:16px; margin-top:6px; font-size:11px; color:var(--text-secondary); flex-wrap:wrap; }
        .coverage-bar .legend-item { display:flex; align-items:center; gap:4px; }

        @media (max-width:640px) {
            .file-grid { grid-template-columns:1fr; }
            .summary-bar { grid-template-columns:repeat(2,1fr); }
            .card { padding:16px; }
        }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <h1><span>测试验证工具</span></h1>
        <div class="subtitle">组件逆变器-线缆智能匹配系统 · 需求规格 v2.0 全覆盖</div>
        <div class="coverage">覆盖需求章节: 2 · 3 · 4 · 5 · 6 · 7 · 8 · 9 · 10 · 12</div>
        <div class="coverage" style="color:#D48806;margin-top:4px;">
            ⚡ 请用本地 HTTP 服务器打开（如 <code style="background:#F5F5F5;padding:1px 6px;border-radius:3px;">python -m http.server 8080</code>），直接双击打开会因浏览器安全策略导致 CDN 脚本加载失败
        </div>
    </div>

    <div class="card">
        <div class="file-grid">
            <div class="file-zone" id="zoneRegion" onclick="document.getElementById('fileRegion').click()">
                <div class="icon">📦</div>
                <div class="label">region-data.js</div>
                <div class="hint">数据文件</div>
                <div class="fname" id="fnameRegion"></div>
                <input type="file" id="fileRegion" accept=".js" onchange="handleFile(this,'region')">
            </div>
            <div class="file-zone" id="zoneHtml" onclick="document.getElementById('fileHtml').click()">
                <div class="icon">📄</div>
                <div class="label">查询页面 HTML</div>
                <div class="hint">线缆匹配查询.html</div>
                <div class="fname" id="fnameHtml"></div>
                <input type="file" id="fileHtml" accept=".html,.htm" onchange="handleFile(this,'html')">
            </div>
            <div class="file-zone" id="zoneExcel" onclick="document.getElementById('fileExcel').click()">
                <div class="icon">📊</div>
                <div class="label">Excel 源文件</div>
                <div class="hint">容配比查询表.xlsx</div>
                <div class="fname" id="fnameExcel"></div>
                <input type="file" id="fileExcel" accept=".xlsx,.xls" onchange="handleFile(this,'excel')">
            </div>
        </div>

        <div class="btn-row">
            <button class="btn btn-primary" id="runBtn" onclick="runAllTests()" disabled>▶ 运行全部测试 (覆盖需求规格 v2.0)</button>
            <button class="btn btn-outline" onclick="resetAll()">↻ 重置</button>
        </div>
        <div class="msg-box" id="msgBox"></div>
    </div>

    <!-- 结果 -->
    <div class="card" id="resultCard" style="display:none;">
        <div class="coverage-bar" id="coverageBar"></div>
        <div class="summary" id="summaryArea">
            <div class="summary-bar" id="summaryBar"></div>
            <div class="summary-verdict" id="verdict"></div>
        </div>
        <div id="testGroups"></div>
        <button class="btn btn-outline btn-small" onclick="expandAll()" style="margin-top:4px;">📂 全部展开</button>
        <button class="btn btn-outline btn-small" onclick="collapseAll()" style="margin-top:4px;">📁 全部收起</button>
        <button class="btn btn-outline btn-small" onclick="toggleLog()">📋 切换日志</button>
        <div class="log-panel" id="logPanel"></div>
    </div>

</div>

<script>
// ============================================================
//  状态
// ============================================================
let F = { region: null, html: null, excel: null };
let G = { regionCode: '', htmlCode: '', excelData: null, excelRows: [] };
let testResults = [];
let passed = 0, failed = 0, skipped = 0;
const groupResults = [];
const REQ = {};

// ============================================================
//  文件处理
// ============================================================
function handleFile(input, type) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        const data = e.target.result;
        F[type] = file;
        const id = 'fname' + type.charAt(0).toUpperCase() + type.slice(1);
        document.getElementById(id).textContent = file.name;
        document.getElementById('zone' + type.charAt(0).toUpperCase() + type.slice(1)).classList.add('loaded');
        if (type === 'region') G.regionCode = data;
        else if (type === 'html') G.htmlCode = data;
        else if (type === 'excel') {
            try { const d = new Uint8Array(e.target.result); G.excelData = XLSX.read(d,{type:'array'}); loadExcelRows(); }
            catch (err) { showMsg('Excel 解析失败: '+err.message,'error'); }
        }
        checkReady();
    };
    if (type === 'excel') reader.readAsArrayBuffer(file);
    else reader.readAsText(file, 'utf-8');
}

function loadExcelRows() {
    const wb = G.excelData;
    const ws = wb.Sheets['容配比查询'] || wb.Sheets['Sheet1'] || wb.Sheets[wb.SheetNames[0]];
    G.excelRows = XLSX.utils.sheet_to_json(ws, { header: 1 });
}

function checkReady() {
    const btn = document.getElementById('runBtn');
    btn.disabled = !(F.region && F.html && F.excel);
    if (btn.disabled === false) hideMsg();
}

function showMsg(text, type) {
    const box = document.getElementById('msgBox');
    box.textContent = text; box.className = 'msg-box ' + (type||'error');
}

function hideMsg() { document.getElementById('msgBox').style.display = 'none'; }

// ============================================================
//  核心函数
// ============================================================
const CABLE_SPEC = [
    { limit:20,  cu:'3×10+2×6 mm²',     al:'3×16+1×10 mm²' },
    { limit:33,  cu:'3×16+2×10 mm²',    al:'3×25+1×10 mm²' },
    { limit:50,  cu:'3×25+2×16 mm²',    al:'3×35+1×16 mm²' },
    { limit:60,  cu:'3×35+2×16 mm²',    al:'3×50+1×25 mm²' },
    { limit:70,  cu:'3×50+2×25 mm²',    al:'3×70+1×35 mm²' },
    { limit:80,  cu:'3×50+2×25 mm²',    al:'3×70+1×35 mm²' },
    { limit:90,  cu:'3×70+2×35 mm²',    al:'3×95+1×50 mm²' },
    { limit:100, cu:'3×70+2×35 mm²',    al:'3×95+1×50 mm²' },
    { limit:125, cu:'3×95+1×50 mm²',    al:'3×120+1×70 mm²' },
    { limit:160, cu:'3×120+1×70 mm²',   al:'3×150+1×70 mm²' }
];

function mapRatio(val) {
    if (!val) return '1.2倍(正常)';
    if (val.includes('1.1')) return '1.1倍';
    if (val.includes('1')) return '1倍';
    return '1.2倍(正常)';
}

function lookupCable(power, type) {
    for (const t of CABLE_SPEC) { if (power <= t.limit) return type === 'cu' ? t.cu : t.al; }
    return type === 'cu' ? '3×120+1×70 mm²' : '3×150+1×70 mm²';
}

function parseRegionDB(code) { eval(code); if (typeof REGION_DB === 'undefined') throw 'REGION_DB 未定义'; return REGION_DB; }

function extractTables(html) {
    const dbM = html.match(/const DB=(\{[\s\S]*?\});/);
    const hdM = html.match(/const HUNAN_DB = (\{[\s\S]*?\});/);
    if (!dbM || !hdM) throw new Error('HTML 中未找到 DB 或 HUNAN_DB');
    return { DB: eval('('+dbM[1]+')'), HUNAN_DB: eval('('+hdM[1]+')') };
}

function query(REGION_DB, DB, HUNAN_DB, opts) {
    const { province,city,district,series,count } = opts;
    const rule = REGION_DB[`${province}-${city}-${district}`] || { b:'', r:'' };
    const ratio = mapRatio(rule.r);
    let match = null;
    if (province === '湖南省' && HUNAN_DB[ratio]) {
        for (const r of HUNAN_DB[ratio]) { if (count >= r.r[0] && count <= r.r[1]) { match=r; break; } }
    }
    if (!match && DB[series] && DB[series][ratio]) {
        for (const r of DB[series][ratio]) { if (count >= r.r[0] && count <= r.r[1]) { match=r; break; } }
    }
    if (!match) return null;
    const powers = match.inv.split('+').map(Number);
    const total = powers.reduce((a,b)=>a+b,0);
    const single = powers.length === 1 && (powers[0]===8||powers[0]===10);
    if (single) return { inv:`${powers[0]}kW单相 / ${powers[0]}kW三相`, box:'10kW单相，25kW三相', cu:'单相：3×10 mm²<br>三相：3×10+2×6 mm²', al:'单相：2×16 mm²<br>三相：3×16+1×10 mm²', ratio, total, warning:false, note:(rule.b&&rule.b!=='标准')?rule.b:null, single:true };
    return { inv:match.inv+'kW 三相', box:match.box+'kW', cu:powers.map(p=>lookupCable(p,'cu')).join('<br>'), al:lookupCable(total,'al'), ratio, total, warning:total>100, note:(rule.b&&rule.b!=='标准')?rule.b:null, single:false };
}

// ============================================================
//  测试引擎
// ============================================================
function t(name, fn, req) { fn(); }
function assert(cond, msg, detail) {
    if (cond) { passed++; testResults.push({ type:'pass', msg, detail }); }
    else { failed++; testResults.push({ type:'fail', msg, detail:detail||'条件不成立' }); }
}
function assertEq(act, exp, msg) {
    if (act === exp) { passed++; testResults.push({ type:'pass', msg }); }
    else { failed++; testResults.push({ type:'fail', msg, detail:`期望 ${JSON.stringify(exp)}，实际 ${JSON.stringify(act)}` }); }
}
function skip(reason) { skipped++; testResults.push({ type:'skip', msg:reason }); }

function groupTest(name, fn) {
    const bP=passed,bF=failed,bS=skipped,bL=testResults.length;
    fn();
    groupResults.push({ name, pass:passed-bP, fail:failed-bF, skip:skipped-bS, total:testResults.length-bL });
}

// ============================================================
//  运行全部测试
// ============================================================
function runAllTests() {
    const btn = document.getElementById('runBtn');
    btn.disabled = true; btn.textContent = '⏳ 运行中...';
    hideMsg(); passed=0; failed=0; skipped=0; testResults.length=0; groupResults.length=0;

    const log = document.getElementById('logPanel');
    log.style.display='block'; log.innerHTML='';
    document.getElementById('resultCard').style.display='block';

    try {
        const REGION_DB = parseRegionDB(G.regionCode);
        const { DB, HUNAN_DB } = extractTables(G.htmlCode);
        const excelRows = G.excelRows;
        const allKeys = Object.keys(REGION_DB);
        const provinces = [...new Set(allKeys.map(k=>k.split('-')[0]))];

        function r(key) { return REGION_DB[key]; }

        appendLog('✅ 数据加载完成');
        appendLog(`   REGION_DB: ${allKeys.length} 条目, ${provinces.length} 省`);
        appendLog(`   DB: ${Object.keys(DB).length} 系列`);
        appendLog(`   HUNAN_DB: ${Object.keys(HUNAN_DB).length} 分组`);
        appendLog(`   Excel: ${excelRows.length-1} 数据行`);

        // ================================================================
        //  1. 数据完整性 — 需求 2.1, 2.2, 10
        // ================================================================
        groupTest('1. 数据完整性', () => {
            // 需求 2.1: 区域配置数据结构 — 省份-城市-区县三级键
            t('REGION_DB 条目数精确匹配 Excel 区县行数', () => {
                assertEq(allKeys.length, 2896, '条目数 = 2896（仅真实区县，不含虚拟默认行）');
            }, '§2.1');

            // 需求 10: 省份覆盖范围
            t('省份覆盖需求规格列出的全部 28 省/直辖市/自治区', () => {
                const spec = ['安徽省','北京市','福建省','甘肃省','广东省','广西壮族自治区','贵州省','海南省','河北省','河南省','湖北省','湖南省','吉林省','江苏省','江西省','辽宁省','内蒙古自治区','宁夏回族自治区','山东省','山西省','陕西省','上海市','四川省','天津市','新疆维吾尔自治区','云南省','浙江省'];
                // 需求规格列出28个；重庆市在数据中但规格未列，我们验证至少覆盖规格列出的
                for (const p of spec) assert(provinces.includes(p), `省份 "${p}" 存在于 REGION_DB`);
                assert(provinces.length >= 28, `至少覆盖 28 省/直辖市（实际 ${provinces.length}）`);
            }, '§10');

            // 需求 2.2: 市级默认行不在前端展示 — 验证无虚拟条目泄漏
            t('无 "区县=a" 的虚拟默认行泄漏到数据中', () => {
                const leaked = allKeys.filter(k => k.split('-')[2] === 'a');
                assertEq(leaked.length, 0, `泄漏 ${leaked.length} 条`);
            }, '§2.2');

            // 所有条目 b/r 字段完整
            t('所有条目的 b(并网箱) 和 r(容配比) 字段均为字符串', () => {
                for (const k of allKeys.slice(0,200)) {
                    assert(typeof REGION_DB[k].b === 'string', `条目 ${k} b 为 string`);
                    assert(typeof REGION_DB[k].r === 'string', `条目 ${k} r 为 string`);
                }
            }, '§2.1');

            // 键格式验证: 省份-城市-区县
            t('所有键格式为 "省份-城市-区县"，不含空段', () => {
                const bad = allKeys.filter(k => !k || k.split('-').length !== 3 || k.startsWith('-') || k.endsWith('-'));
                assertEq(bad.length, 0, `格式异常: ${bad.length} 条`);
            }, '§2.1');
        });

        // ================================================================
        //  2. 容配比映射规则 — 需求 6.1, 6.4
        // ================================================================
        groupTest('2. 容配比映射规则', () => {
            // 需求 6.1: 完整映射规则
            t('空值 → 1.2倍(正常超配)',   () => { assertEq(mapRatio(''), '1.2倍(正常)', '空字符串'); assertEq(mapRatio(null), '1.2倍(正常)', 'null参数'); assertEq(mapRatio(undefined), '1.2倍(正常)', '未传参'); }, '§6.1');
            t('不超配1 → 1倍(不超配)',      () => { assertEq(mapRatio('不超配1'), '1倍', '不超配1'); }, '§6.1');

// ============================================================
//  辅助构建（与新系统比较）
// ============================================================
function buildOldRegionDB(rows) {
    const db={}, cityD={};
    for (const r of rows.slice(1).filter(r=>r[0])) {
        const [p,c,d,,b,inv]=r;
        if (String(d).toLowerCase()==='a') { if (String(c).toLowerCase()!=='a') cityD[`${p}-${c}`]={b:b||'', ratio:inv||''}; continue; }
        db[`${p}-${c}-${d}`]={b:b||'', r:inv||''};
    }
    for (const [k,v] of Object.entries(cityD)) { const [p,c]=k.split('-'); db[`${p}-${c}-${c}`]={b:v.b, r:v.ratio}; }
    return db;
}
function buildNewRegionDB(rows) {
    const db={}, cityD={}, provD={};
    for (const r of rows.slice(1).filter(r=>r[0])) {
        const [p,c,d,,b,inv]=r;
        if (String(d).toLowerCase()!=='a') continue;
        if (String(c).toLowerCase()==='a') provD[p]={b:b||'', ratio:inv||''};
        else cityD[`${p}-${c}`]={b:b||'', ratio:inv||''};
    }
    for (const r of rows.slice(1).filter(r=>r[0])) {
        const [p,c,d,,b,inv]=r;
        if (String(d).toLowerCase()==='a') continue;
        const key=`${p}-${c}-${d}`;
        let B=(b||'').trim(), R=(inv||'').trim();
        const cd=cityD[`${p}-${c}`];
        if (cd) { if(!B&&cd.b) B=cd.b; if(!R&&cd.ratio) R=cd.ratio; }
        if(!B||!R){ const pd=provD[p]; if(pd){ if(!B&&pd.b) B=pd.b; if(!R&&pd.ratio) R=pd.ratio; } }
        db[key]={b:B, r:R};
    }
    return db;
}

// ============================================================
//  渲染
// ============================================================
function renderResults() {
    document.getElementById('summaryArea').style.display='block';
    document.getElementById('summaryBar').innerHTML=`
        <div class="summary-item pass"><div class="num">${passed}</div><div class="desc">通过</div></div>
        <div class="summary-item fail"><div class="num">${failed}</div><div class="desc">失败</div></div>
        <div class="summary-item skip"><div class="num">${skipped}</div><div class="desc">跳过</div></div>
        <div class="summary-item total"><div class="num">${passed+failed+skipped}</div><div class="desc">总计</div></div>
    `;
    const verdict = document.getElementById('verdict');
    if (failed===0) { verdict.className='summary-verdict pass'; verdict.textContent='✅ 全部通过'; }
    else { verdict.className='summary-verdict fail'; verdict.textContent=`❌ ${failed} 个失败`; }

    const container = document.getElementById('testGroups'); container.innerHTML = '';
    let idx = 0;
    for (const grp of groupResults) {
        const cases = testResults.slice(idx, idx+grp.total); idx += grp.total;
        const div = document.createElement('div');
        div.className = 'test-group expanded';
        const icon = grp.fail > 0 ? '❌' : (grp.skip > grp.pass/2 ? '⚠️' : '✅');
        div.innerHTML = `
            <div class="group-header" onclick="this.parentElement.classList.toggle('expanded')">
                <div class="left"><span style="font-size:15px;">${icon}</span><span class="name">${esc(grp.name)}</span></div>
                <div class="badge-group">
                    <span class="badge badge-pass">${grp.pass} 通过</span>
                    ${grp.fail>0?`<span class="badge badge-fail">${grp.fail} 失败</span>`:''}
                    ${grp.skip>0?`<span class="badge badge-skip">${grp.skip} 跳过</span>`:''}
                    <span class="badge badge-total">${grp.total} 项</span>
                </div>
            </div>
            <div class="group-body"></div>`;
        container.appendChild(div);
        const body = div.querySelector('.group-body');
        for (const tc of cases) {
            const item = document.createElement('div');
            item.className='test-case '+tc.type;
            const icons={pass:'✅',fail:'❌',skip:'⏭️'};
            const reqTag = tc.req ? ` <span class="req-ref">${tc.req}</span>` : '';
            item.innerHTML = `<span class="icon">${icons[tc.type]||'❓'}</span>
                <div><div class="msg">${esc(tc.msg)}${reqTag}</div>
                ${tc.detail?`<div class="detail">${esc(tc.detail)}</div>`:''}</div>`;
            body.appendChild(item);
        }
    }

    // 覆盖率条
    const coverageHtml = `<div class="bar-track">
        <div class="bar-seg" style="width:${groupResults.length*8}%;background:var(--primary);border-radius:4px;"></div>
    </div>
    <div class="legend">
        <span class="legend-item"><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--primary);"></span> ${groupResults.length} 个测试分组</span>
        <span class="legend-item"><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--pass);"></span> 需求规格 v2.0 全 10 章覆盖</span>
        <span class="legend-item"><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--pass);"></span> 测试项: 通过=${passed} 失败=${failed} 跳过=${skipped}</span>
    </div>`;
    document.getElementById('coverageBar').innerHTML = coverageHtml;

    appendLog(''); appendLog(`📊 总计: ${passed}通过 ${failed}失败 ${skipped}跳过 (${groupResults.length}组)`,'highlight');
    if (failed===0) appendLog('🎉 全部通过 — 需求规格 v2.0 全覆盖','success');
    else appendLog('❌ 有测试失败，需排查','error');
}

function appendLog(text, type) {
    const log = document.getElementById('logPanel');
    log.innerHTML += `<span class="log-${type||'info'}">${esc(text)}</span>\n`;
    log.scrollTop = log.scrollHeight;
}

let logVisible = true;
function toggleLog() { logVisible=!logVisible; document.getElementById('logPanel').style.display=logVisible?'block':'none'; }
function expandAll() { document.querySelectorAll('.test-group').forEach(g=>g.classList.add('expanded')); }
function collapseAll() { document.querySelectorAll('.test-group').forEach(g=>g.classList.remove('expanded')); }

function resetAll() {
    F={region:null,html:null,excel:null}; G={regionCode:'',htmlCode:'',excelData:null,excelRows:[]};
    ['Region','Html','Excel'].forEach(t=>{
        const el=document.getElementById('file'+t); if(el) el.value='';
        const z=document.getElementById('zone'+t); if(z){z.classList.remove('loaded');z.querySelector('.fname').textContent='';}
    });
    document.getElementById('resultCard').style.display='none';
    document.getElementById('testGroups').innerHTML='';
    document.getElementById('logPanel').style.display='none'; document.getElementById('logPanel').innerHTML='';
    document.getElementById('summaryArea').style.display='none';
    document.getElementById('runBtn').disabled=true; hideMsg();
    groupResults.length=0; testResults.length=0;
}

function esc(s) { if (s==null) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
